# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.14"
  jobs:
    # The build virtualenv's bundled pip is too old for "pip install --group",
    # so use uv to install the project plus its "doc" dependency group into it.
    install:
      - python -m pip install uv
      - uv pip install --python "$READTHEDOCS_VIRTUALENV_PATH/bin/python" --group doc .

sphinx:
   configuration: docs/conf.py

formats:
  - epub
  - pdf
